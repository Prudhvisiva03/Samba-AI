<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Samba AI - Admin Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0A0A0A; color: #F4F4F5; padding: 40px; margin: 0; }
    h1 { color: #8B5CF6; }
    .card { background: #111; padding: 24px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; margin-bottom: 20px; max-width: 400px; }
    .stat { font-size: 32px; font-weight: bold; margin-top: 8px; }
    .label { color: #A1A1AA; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .error { color: #EF4444; }
  </style>
</head>
<body>
  <h1>Samba AI Admin</h1>
  <div id="content">Loading stats...</div>

  <script>
    async function loadStats() {
      try {
        const res = await fetch('/api/admin/stats');
        const data = await res.json();
        
        if (res.status === 403) {
          document.getElementById('content').innerHTML = `<p class="error">Access Denied. You must log in as prudhvisiva03@gmail.com on the main app first.</p>`;
          return;
        }

        document.getElementById('content').innerHTML = `
          <div class="card">
            <div class="label">Total Registered Users</div>
            <div class="stat">${data.users}</div>
          </div>
          <div class="card">
            <div class="label">Total Chat Sessions</div>
            <div class="stat">${data.chats}</div>
          </div>
          <div class="card">
            <div class="label">Total Messages Sent</div>
            <div class="stat">${data.messages}</div>
          </div>
        `;
      } catch(e) {
        document.getElementById('content').innerHTML = `<p class="error">Failed to load. Are you logged in?</p>`;
      }
    }
    loadStats();
  </script>
</body>
</html>
